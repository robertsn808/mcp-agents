# MCP Property Search Agent Configuration
# Add these properties to your application.properties file

# MCP Agent Configuration
mcp.agent.base-url=http://localhost:8000
mcp.agent.timeout=30000
mcp.agent.retry-attempts=3
mcp.agent.retry-delay=1000

# Enable MCP integration
mcp.integration.enabled=true
mcp.integration.auto-sync=true
mcp.integration.sync-interval=3600000

# Property Search Configuration
property.search.default-radius=25
property.search.max-results=50
property.search.sources=zillow,realtor
property.search.enable-ai-analysis=true

# Webhook Configuration for MCP Results
mcp.webhook.enabled=true
mcp.webhook.endpoint=/webhook/property-search
mcp.webhook.secret=${MCP_WEBHOOK_SECRET:default-secret-change-in-production}

# Logging Configuration
logging.level.com.realconnect.service.McpPropertySearchService=DEBUG
logging.level.com.realconnect.controller.McpPropertyController=DEBUG
logging.level.com.realconnect.controller.EnhancedSellerController=DEBUG

# Database Configuration for MCP Data
# Uncomment if you want to store property search results
# spring.jpa.hibernate.ddl-auto=update
# mcp.storage.enabled=true
# mcp.storage.retention-days=30

# External Service Integration
# Real estate data sources (if applicable)
# realtor.api.key=${REALTOR_API_KEY:}
# zillow.api.key=${ZILLOW_API_KEY:}

# AI Analysis Configuration
openai.api.key=${OPENAI_API_KEY:}
ai.analysis.enabled=true
ai.analysis.model=gpt-3.5-turbo
ai.analysis.max-tokens=2000

# Email Notifications for Property Matches
mail.notifications.enabled=true
mail.notifications.template.buyer-match=buyer-property-match
mail.notifications.template.seller-analysis=seller-market-analysis

# Marketing Automation Integration
marketing.automation.enabled=true
marketing.automation.trigger-on-property-match=true
marketing.automation.trigger-on-market-analysis=true

# Performance Configuration
mcp.performance.cache-enabled=true
mcp.performance.cache-ttl=1800
mcp.performance.parallel-searches=true
mcp.performance.max-concurrent-searches=5

# Development/Testing Configuration
mcp.development.mock-enabled=false
mcp.development.mock-data-file=classpath:mock-property-data.json
mcp.development.log-requests=true

# Security Configuration
mcp.security.api-key-required=false
mcp.security.rate-limit.enabled=true
mcp.security.rate-limit.requests-per-minute=60

# Monitoring and Metrics
management.endpoints.web.exposure.include=health,metrics,prometheus
management.endpoint.health.show-details=always
management.metrics.export.prometheus.enabled=true

# Health Check Configuration
management.health.custom.enabled=true
mcp.health-check.enabled=true
mcp.health-check.interval=60000
mcp.health-check.timeout=5000